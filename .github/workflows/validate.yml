name: validate-skills

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill folders
        run: python tools/validate_skills.py skills

      - name: Check private files are not shared
        run: python tools/check_private_skill_files.py

      - name: Run smoke tests
        run: python tools/run_smoke_tests.py
